
<style>
div.gallery {
  border: 1px solid #ccc;
}

div.gallery:hover {
  border: 1px solid #777;
}

div.gallery img {
  width: 100%;
  height: auto;
}

div.desc {
  padding: 15px;
  text-align: center;
}

* {
  box-sizing: border-box;
}

.responsive {
  padding: 0 6px;
  float: left;
  width: 24.99999%;
}

@media only screen and (max-width: 700px) {
  .responsive {
    width: 49.99999%;
    margin: 6px 0;
  }
}

@media only screen and (max-width: 500px) {
  .responsive {
    width: 100%;
  }
}

.clearfix:after {
  content: "";
  display: table;
  clear: both;
}
</style>


<h2>${properties.title1}</h2>

<h4>${properties.title2}</h4>

<data-sly-list.imageanddesc="${resource.getChildren}">
	<data-sly-repeat.item="${imageanddesc.getChildren}">

<div class="responsive">
  <div class="gallery">
    <a target="_blank" href="${item.ctaimage}">
      <img src="${item.ctaimage}" alt="${item.ctaalttext}" width="600" height="400">
    </a>
    <div class="desc">${item.ctadesc}</div>
  </div>
</div>





<div class="clearfix"></div>

<div style="padding:6px;">
  <p>${properties.description}</p>
</div>
